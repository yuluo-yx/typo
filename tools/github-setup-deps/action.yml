name: setup-deps
description: Install host system dependencies
runs:
  using: composite
  steps:
    - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version-file: go.mod
    - uses: actions/setup-python@v5
      with:
        python-version: '3.13'
    - uses: actions/setup-node@v4
      with:
        node-version: '22'
