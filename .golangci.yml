version: "2"

run:
  timeout: 5m
  issues-exit-code: 1

linters:
  default: none
  enable:
    - bodyclose
    - copyloopvar
    - dupl
    - errcheck
    - errorlint
    - goconst
    - gocritic
    - gocyclo
    - gosec
    - govet
    - ineffassign
    - misspell
    - prealloc
    - revive
    - staticcheck
    - unconvert
    - unused
  settings:
    gocritic:
      disabled-checks:
        - ifElseChain
    goconst:
      min-len: 5
      min-occurrences: 4
    gocyclo:
      min-complexity: 15
    dupl:
      threshold: 100
    gosec:
      excludes:
        - G404
    govet:
      enable-all: true
      disable:
        - fieldalignment
    revive:
      rules:
        - name: exported
          arguments:
            - checkPrivateReceivers
            - disableStutteringCheck
        - name: package-comments
          disabled: true
  exclusions:
    generated: lax
    presets:
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - path: _test\.go
        linters:
          - dupl
          - goconst
          - errcheck
          - gosec
          - revive
      - path: internal/engine/rules\.go
        linters:
          - misspell

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: true
    goimports:
      local-prefixes:
        - github.com/yuluo-yx/typo
  exclusions:
    generated: lax
