name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
    paths:
      - '**.go'
      - '**.mod'
      - '**.sum'
      - 'Makefile'
      - 'e2e/**'
      - 'install/**'
      - 'tools/github-setup-deps/**'
      - 'tools/make/**'
      - 'tools/scripts/**'
      - '.github/workflows/**'
  pull_request:
    branches: [main]
    paths:
      - '**.go'
      - '**.mod'
      - '**.sum'
      - 'Makefile'
      - 'e2e/**'
      - 'install/**'
      - 'tools/github-setup-deps/**'
      - 'tools/make/**'
      - 'tools/scripts/**'
      - '.github/workflows/**'

jobs:
  ci:
    name: CI Checks
    runs-on: ubuntu-latest
    if: github.repository == 'yuluo-yx/typo'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./tools/github-setup-deps
      - run: make download
      - run: make ci

  build:
    name: Build
    runs-on: ubuntu-latest
    if: github.repository == 'yuluo-yx/typo'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./tools/github-setup-deps
      - run: make build
      - run: make verify-version-metadata VERSION=9.9.9

  e2e-docker:
    name: E2E Docker
    runs-on: ubuntu-latest
    if: github.repository == 'yuluo-yx/typo'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./tools/github-setup-deps
      - run: make build-e2e-image
      - run: make test-e2e-docker

  e2e-fish:
    name: E2E fish
    runs-on: ubuntu-latest
    if: github.repository == 'yuluo-yx/typo'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./tools/github-setup-deps
      - name: Install fish
        run: |
          sudo apt-get update
          sudo apt-get install -y fish
      - name: Verify fish
        run: fish --version
      - name: Run fish e2e tests
        run: go test ./e2e -v -run 'TestE2E(Fish(Integration|Inventory)|DoctorDetectsFishHints)'

  e2e-host:
    name: E2E ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    if: github.repository == 'yuluo-yx/typo'
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./tools/github-setup-deps
      - name: Run e2e tests
        shell: bash
        run: make test-e2e
