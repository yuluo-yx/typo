name: Update Contributors

on:
  workflow_dispatch:
    inputs:
      delivery_mode:
        description: Delivery mode for contributor SVG updates
        required: false
        default: pr
        type: choice
        options:
          - pr
          - push
  schedule:
    - cron: "0 0 * * 0"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-contributors:
    runs-on: ubuntu-latest
    if: github.repository == 'yuluo-yx/typo'
    env:
      DELIVERY_MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.delivery_mode || 'pr' }}
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate contributors SVG
        uses: deigmata-paideias/contributors-list@39f94c2cddee224aaa98e25e2f9f4af8e4a3840c
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          svgPath: .github/CONTRIBUTORS.svg
          svgWidth: 1000
          avatarSize: 72
          avatarMargin: 45
          userNameHeight: 20
          noFetch: false
          noCommit: true
          truncate: 0
          includeBots: false
          includeCoAuthors: true
          excludeUsers: "github-actions web-flow dependabot claude"
          itemTemplate: |
            <g transform="translate({{ x }}, {{ y }})">
              <defs>
                <clipPath id="cp-{{ login }}">
                  <circle cx="36" cy="36" r="36" />
                </clipPath>
              </defs>
              <a xlink:href="{{{ url }}}" href="{{{ url }}}" class="contributor-link" target="_blank" rel="nofollow sponsored" title="{{{ name }}}">
                <image width="72" height="72" xlink:href="{{{ avatar }}}" href="{{{ avatar }}}" clip-path="url(#cp-{{ login }})" />
                <text x="36" y="86" text-anchor="middle" alignment-baseline="middle" font-size="10" fill="#666" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif">{{{ name }}}</text>
              </a>
            </g>

      - name: Commit & Push
        uses: stefanzweifel/git-auto-commit-action@v7
        if: env.DELIVERY_MODE == 'push'
        with:
          commit_message: "chore: update contributors [skip ci]"
          file_pattern: .github/CONTRIBUTORS.svg
          commit_user_name: github-actions[bot]
          commit_user_email: 41898282+github-actions[bot]@users.noreply.github.com
          commit_author: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        if: env.DELIVERY_MODE == 'pr'
        with:
          branch: automation/update-contributors
          delete-branch: true
          add-paths: |
            .github/CONTRIBUTORS.svg
          commit-message: "chore: update contributors [skip ci]"
          title: "chore: update contributors"
          body: |
            Automatically update `.github/CONTRIBUTORS.svg`.

            - Trigger event: `${{ github.event_name }}`
            - Delivery mode: `pr`
          author: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          committer: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
