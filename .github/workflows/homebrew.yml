name: Homebrew

permissions:
  contents: read

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'Formula/**'
      - 'tools/release/update-homebrew-formula.sh'
  pull_request:
    branches: [main]
    paths:
      - 'Formula/**'
      - 'tools/release/update-homebrew-formula.sh'

jobs:
  test:
    name: Homebrew ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    # Dependabot 不维护 Homebrew formula；即使未来路径过滤扩大，也不在依赖 PR 中执行 brew。
    if: >-
      github.repository == 'yuluo-yx/typo' &&
      (github.event_name != 'pull_request' || github.actor != 'dependabot[bot]')
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: Homebrew/actions/setup-homebrew@59e6b20d96df1a3c9ccb0aa402676e01a4cc6ff3

      - name: Tap local checkout
        run: brew tap yuluo-yx/typo "$GITHUB_WORKSPACE"

      - name: Audit formula
        run: brew audit --strict --online yuluo-yx/typo/typo

      - name: Install formula
        run: HOMEBREW_NO_INSTALL_FROM_API=1 brew install --verbose yuluo-yx/typo/typo

      - name: Test formula
        run: brew test yuluo-yx/typo/typo

      - name: Verify binary
        run: typo version
