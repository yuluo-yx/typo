name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4.4.0 (pin SHA to avoid supply chain attacks))
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: tools/release/release-please-config.json
          manifest-file: tools/release/.release-please-manifest.json

  build-and-release:
    name: Build and Release
    needs: release-please
    if: github.repository == 'yuluo-yx/typo' && needs.release-please.outputs.release_created == 'true' && needs.release-please.outputs.tag_name != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./tools/github-setup-deps

      - name: Derive version from release tag
        id: version
        run: |
          TAG="${{ needs.release-please.outputs.tag_name }}"
          test -n "$TAG"
          echo "VERSION=${TAG#v}" >> $GITHUB_OUTPUT

      - name: Build all platforms
        run: make build-all VERSION=${{ steps.version.outputs.VERSION }}

      - name: Rename binaries
        run: |
          cd bin
          for dir in */; do
            dir=${dir%/}
            case "$dir" in
              windows-*)
                mv "$dir/typo.exe" "typo-$dir.exe"
                ;;
              *)
                mv "$dir/typo" "typo-$dir"
                ;;
            esac
          done

      - name: Generate checksums
        run: |
          cd bin
          sha256sum \
            typo-darwin-amd64 \
            typo-darwin-arm64 \
            typo-linux-amd64 \
            typo-linux-arm64 \
            typo-windows-amd64.exe \
            typo-windows-arm64.exe > checksums.txt

      - name: Upload release artifacts
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v2.6.1 (pin SHA to avoid supply chain attacks)
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: |
            bin/typo-*
            bin/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
