name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./tools/github-setup-deps
      - name: Derive version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build all platforms
        run: make build-all VERSION=${{ steps.version.outputs.VERSION }}

      - name: Rename binaries
        run: |
          cd bin
          for dir in */; do
            dir=${dir%/}
            mv "$dir/typo" "typo-$dir"
          done

      - name: Upload release artifacts
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1 (pin SHA to avoid supply chain attacks)
        with:
          files: bin/typo-*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
