name: Benchmark

permissions:
  contents: read
  issues: write

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:
    inputs:
      force_compare:
        description: Force a same-run comparison against HEAD^ even if this commit was already benchmarked.
        required: false
        type: boolean
        default: false

jobs:
  benchmark:
    name: Benchmark
    runs-on: ubuntu-latest
    if: github.repository == 'yuluo-yx/typo'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: ./tools/github-setup-deps
      - run: make download

      - name: Install benchstat
        run: go install golang.org/x/perf/cmd/benchstat@latest

      - name: Restore benchmark state
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        with:
          path: benchmark-state.env
          key: benchmark-state-${{ github.run_id }}
          restore-keys: benchmark-state-

      - name: Select baseline commit
        id: state
        env:
          FORCE_COMPARE: ${{ github.event_name == 'workflow_dispatch' && inputs.force_compare == true }}
        run: |
          current_sha="$(git rev-parse HEAD)"
          previous_sha=""
          if [ -f benchmark-state.env ]; then
            previous_sha="$(sed -n 's/^sha=//p' benchmark-state.env | head -n 1)"
          fi

          baseline_ref=""
          if [ "$FORCE_COMPARE" = "true" ] || [ "$previous_sha" = "$current_sha" ] || [ -z "$previous_sha" ]; then
            if git rev-parse --verify HEAD^ >/dev/null 2>&1; then
              baseline_ref="$(git rev-parse HEAD^)"
            fi
          elif git cat-file -e "$previous_sha^{commit}" 2>/dev/null; then
            baseline_ref="$previous_sha"
          elif git rev-parse --verify HEAD^ >/dev/null 2>&1; then
            baseline_ref="$(git rev-parse HEAD^)"
          fi

          should_compare=false
          skip_reason="no baseline commit is available"
          if [ -n "$baseline_ref" ] && [ "$baseline_ref" != "$current_sha" ]; then
            if [ "$FORCE_COMPARE" = "true" ] || [ "$previous_sha" != "$current_sha" ]; then
              should_compare=true
              skip_reason=""
            else
              skip_reason="current commit was already benchmarked"
            fi
          fi

          echo "current_sha=$current_sha" >> "$GITHUB_OUTPUT"
          echo "previous_sha=$previous_sha" >> "$GITHUB_OUTPUT"
          echo "baseline_ref=$baseline_ref" >> "$GITHUB_OUTPUT"
          echo "should_compare=$should_compare" >> "$GITHUB_OUTPUT"
          echo "skip_reason=$skip_reason" >> "$GITHUB_OUTPUT"

      - name: Run baseline benchmarks
        if: steps.state.outputs.should_compare == 'true'
        run: |
          baseline_parent="$(mktemp -d "${RUNNER_TEMP}/typo-benchmark-baseline.XXXXXX")"
          baseline_dir="${baseline_parent}/repo"
          trap 'git worktree remove --force "$baseline_dir" >/dev/null 2>&1 || true; rmdir "$baseline_parent" >/dev/null 2>&1 || true' EXIT
          git worktree add --detach "$baseline_dir" "${{ steps.state.outputs.baseline_ref }}"
          (
            cd "$baseline_dir"
            go mod download
            go test -bench=. -benchmem -count=10 -run='^$' -timeout=30m ./benchmarks/
          ) | tee baseline.txt

      - name: Run benchmarks
        run: |
          go test -bench=. -benchmem -count=10 -run='^$' -timeout=30m ./benchmarks/ \
            | tee current.txt

      - name: Report skipped comparison
        if: steps.state.outputs.should_compare != 'true'
        run: |
          echo "Skipping regression comparison: ${{ steps.state.outputs.skip_reason }}."

      - name: Compare with baseline
        if: steps.state.outputs.should_compare == 'true'
        id: compare
        env:
          REGRESSION_THRESHOLD: 10
        run: |
          echo "=== benchstat comparison ==="
          benchstat baseline.txt current.txt 2>&1 | tee comparison.txt || true

          if grep -E '\+[0-9]+\.[0-9]+%.*\(p=0\.0[0-4]' comparison.txt | \
             awk -v t="$REGRESSION_THRESHOLD" '{
               for (i=1; i<=NF; i++) {
                 if ($i ~ /^\+[0-9.]+%$/) {
                   v = $i; gsub(/[+%]/, "", v)
                   if (v+0 >= t) { found=1; exit }
                 }
               }
             } END { exit !found }'; then
            echo "regression=true" >> "$GITHUB_OUTPUT"
          else
            echo "regression=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update benchmark state
        run: |
          {
            echo "sha=${{ steps.state.outputs.current_sha }}"
            echo "updated_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } > benchmark-state.env

      - name: Save benchmark state
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        with:
          path: benchmark-state.env
          key: benchmark-state-${{ github.run_id }}

      - name: Open regression issue
        if: steps.compare.outputs.regression == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        env:
          BASELINE_SHA: ${{ steps.state.outputs.baseline_ref }}
          CURRENT_SHA: ${{ steps.state.outputs.current_sha }}
        with:
          script: |
            const fs = require('fs');
            const comparison = fs.readFileSync('comparison.txt', 'utf8');

            const THRESHOLD = 10;
            const regressions = comparison.split('\n')
              .filter(line => {
                const pctMatch = line.match(/\+(\d+\.\d+)%/);
                const pMatch = line.match(/\(p=0\.0[0-4]/);
                return pctMatch && pMatch && parseFloat(pctMatch[1]) >= THRESHOLD;
              })
              .map(line => line.trim())
              .filter(Boolean);

            const since = new Date(Date.now() - 24 * 60 * 60 * 1000).toISOString();
            const { data: pulls } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'closed',
              sort: 'updated',
              direction: 'desc',
              per_page: 20,
            });
            const recentPRs = pulls
              .filter(pr => pr.merged_at && new Date(pr.merged_at) > new Date(since))
              .map(pr => `- #${pr.number} ${pr.title} (by @${pr.user.login})`);

            const runURL = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const date = new Date().toISOString().slice(0, 10);

            let body = `The nightly benchmark run detected a performance regression (≥${THRESHOLD}% with p<0.05).\n\n`;
            body += `**Workflow run:** ${runURL}\n\n`;
            body += `**Baseline commit:** ${process.env.BASELINE_SHA}\n`;
            body += `**Current commit:** ${process.env.CURRENT_SHA}\n\n`;
            body += `### Regressed benchmarks\n\n`;
            body += '```\n' + regressions.join('\n') + '\n```\n\n';
            body += `### Full comparison\n\n`;
            body += '<details>\n<summary>benchstat output</summary>\n\n';
            body += '```\n' + comparison.trim() + '\n```\n\n</details>\n\n';
            body += `### Potential causes\n\n`;
            if (recentPRs.length > 0) {
              body += `PRs merged in the last 24 hours:\n\n${recentPRs.join('\n')}\n`;
            } else {
              body += `No PRs were merged in the last 24 hours. This comparison was generated by benchmarking the baseline and current commits in the same workflow run.\n`;
            }

            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'kind/performance',
              state: 'open',
              per_page: 20,
            });
            const existing = openIssues.find(i => i.title.startsWith('Benchmark regression detected'));

            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: `### Update — ${date}\n\n${body}`,
              });
              core.info(`Commented on existing issue #${existing.number}`);
            } else {
              const { data: created } = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `Benchmark regression detected (${date})`,
                body,
                labels: ['kind/performance'],
                assignees: ['yuluo-yx'],
              });
              core.info(`Created issue #${created.number}`);
            }

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: benchmark-results
          path: |
            current.txt
            baseline.txt
            comparison.txt
          if-no-files-found: ignore
          retention-days: 90

      - name: Fail on regression
        if: steps.compare.outputs.regression == 'true'
        run: |
          echo "::error::Benchmark regression detected (>=10% with p<0.05) against the same-run baseline."
          cat comparison.txt
          exit 1
